<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f59e0b" />
  <title>You're offline — Splunch</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111827;
      color: #f9fafb;
      font-family: system-ui, sans-serif;
      padding: 1.5rem;
    }
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      text-align: center;
      max-width: 320px;
    }
    .icon { font-size: 3rem; }
    h1 { font-size: 1.25rem; font-weight: 700; }
    p { font-size: 0.875rem; color: #9ca3af; line-height: 1.6; }
    button {
      margin-top: 0.5rem;
      padding: 0.5rem 1.25rem;
      background: #f59e0b;
      color: #111827;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon">📵</div>
    <h1 id="title">You're offline</h1>
    <p>This page hasn't been cached yet. Open it while online and it will be available offline next time.</p>
    <button onclick="tryAgain()">Try again</button>
  </div>
  <script>
    function navigate() {
      if (location.pathname === '/offline.html') {
        history.back();
      } else {
        location.reload();
      }
    }

    function tryAgain() {
      if (navigator.onLine) {
        navigate();
      }
    }

    window.addEventListener('online', () => {
      document.getElementById('icon').textContent = '✅';
      document.getElementById('title').textContent = 'Back online';
      setTimeout(navigate, 800);
    });
  </script>
</body>
</html>
